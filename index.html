<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Trust | Официальный портал</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #161d26;
            --accent-gold: #b39359;
            --text-main: #ffffff;
            --shadow-dark: #0a0e14;
            --shadow-light: #222c3a;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Анимация проявления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 1s ease forwards;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 2px 2px 4px var(--shadow-dark);
        }

        h1 {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-top: 10px;
            font-weight: 400;
        }

        #datetime {
            margin-top: 15px;
            color: #7a869a;
            font-size: 0.85rem;
            font-weight: 300;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: linear-gradient(145deg, #182029, #141a22);
            border-radius: 6px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 10px 10px 20px var(--shadow-dark),
                        -5px -5px 15px var(--shadow-light);
            border-top: 1px solid rgba(179, 147, 89, 0.2);
            opacity: 0; /* Скрыто до начала анимации */
            animation: fadeInUp 0.8s ease forwards;
            transition: all 0.3s ease;
        }

        /* Задержка появления для каждой карточки */
        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.4s; }
        .card:nth-child(4) { animation-delay: 0.5s; }
        .card:nth-child(5) { animation-delay: 0.6s; }
        .card:nth-child(6) { animation-delay: 0.7s; }

        .card span {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .card:hover {
            transform: translateY(-5px);
            border-top: 1px solid var(--accent-gold);
            box-shadow: 15px 15px 30px var(--shadow-dark);
        }

        footer {
            margin-top: 60px;
            text-align: center;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1s;
            opacity: 0;
        }

        .gear {
            font-size: 2rem;
            display: inline-block;
            animation: spin 5s linear infinite;
            color: var(--accent-gold);
            margin-bottom: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
        }

        .info-block {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #5d6a7e;
            text-align: center;
            line-height: 1.6;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1.2s;
            opacity: 0;
        }

        .info-block a { color: var(--accent-gold); text-decoration: none; }

        @media (min-width: 1000px) {
            .contact-info { position: absolute; bottom: 30px; left: 40px; text-align: left; }
            .dev-credits { position: absolute; bottom: 30px; right: 40px; text-align: right; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-name">Trading Trust</div>
        <h1>Корпоративный ресурс</h1>
        <div id="datetime"></div>
    </header>

    <div class="grid-container">
        <div class="card"><span>Стратегия</span></div>
        <div class="card"><span>Аналитика</span></div>
        <div class="card"><span>Проекты</span></div>
        <div class="card) "><span>Документы</span></div>
        <div class="card"><span>Капитал</span></div>
        <div class="card"><span>Связь</span></div>
    </div>

    <footer>
        <div class="gear">⚙</div>
        <div class="status-text">сайт на стадии разработки</div>
        <div class="info-block copyright">© 2026 Trading Trust</div>
    </footer>

    <div class="info-block contact-info">
        Связь с нами:<br>
        <a href="mailto:tora@oqtora.ru">tora@oqtora.ru</a>
    </div>

    <div class="info-block dev-credits">
        Разработчики:<br>
        <b>WhiteWolf, Akio Mori, McMillan</b>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', day: 'numeric', month: 'long', 
                year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' 
            };
            document.getElementById('datetime').innerText = now.toLocaleString('ru-RU', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
