<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oqtora | Профиль разработчика</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        h1 { font-size: 1.8rem; margin: 0 0 10px 0; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-2px);
        }

        .main-btn {
            margin-top: 25px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            transition: 0.4s;
        }

        .main-btn:hover {
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="2880x1620.jpg.jpg" alt="Oqtora" class="profile-pic">
        
        <h1>OQTORA 👋</h1>
        <p>Добро пожаловать на мой личный сайт</p>
        
        <div class="links">
            <a href="https://t.me" target="_blank" class="link-btn">Telegram</a>
            <a href="https://github.com" target="_blank" class="link-btn">GitHub</a>
            
            <!-- Теперь и ссылка, и текст на кнопке — tora@oqtora.ru -->
            <a href="mailto:tora@oqtora.ru" class="link-btn">tora@oqtora.ru</a>
        </div>

        <button class="main-btn" onclick="celebrate()">Поздороваться!</button>
    </div>

    <script>
        function celebrate() {
            alert('Рад знакомству! Сайт oqtora.ru официально запущен! 🚀');
        }
    </script>

</body>
</html>
