<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать | В разработке</title>
    <style>
        /* Общие настройки страницы */
        body {
            background: #0f172a; /* Глубокий темно-синий цвет (как у профи) */
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Контейнер с текстом */
        .container {
            text-align: center;
            padding: 20px;
        }

        /* Главный заголовок с анимацией */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 2s ease-in;
        }

        /* Текст описания */
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Индикатор загрузки */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        /* Анимации */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптивность для телефонов */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Добро пожаловать!</h1>
        <p>Сайт находится в процессе создания.</p>
        <div class="loader"></div>
        <p style="margin-top: 20px; font-size: 0.9rem;">Загляните чуть позже 🚀</p>
    </div>

</body>
</html>
