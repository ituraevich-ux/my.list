<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Trust | Официальный портал</title>
    <!-- Респектабельные шрифты от Кувена (Medium 400 и Bold 700) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #161d26;
            --accent-gold: #b39359;
            --gold-light: #f1d39b;
            --gold-dark: #7d633a;
            --text-main: #ffffff;
            --shadow-dark: #0a0e14;
            --shadow-light: #222c3a;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif; /* Шрифты Кувена */
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            padding: 40px 20px; box-sizing: border-box;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 60px; }

        /* Объемный логотип в стиле Playfair Display 700 */
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 9vw, 4.5rem);
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--accent-gold) 45%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 15px var(--shadow-dark)) drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            letter-spacing: 2px;
            transition: all 0.4s ease;
            cursor: default;
        }

        .brand-name:hover {
            transform: scale(1.02) translateY(-3px);
            filter: drop-shadow(0 20px 25px var(--shadow-dark)) drop-shadow(0 0 10px rgba(179, 147, 89, 0.3));
        }

        h1 {
            font-size: 0.8rem; letter-spacing: 6px;
            text-transform: uppercase; color: var(--accent-gold);
            margin-top: 15px; font-weight: 400;
            opacity: 0.7;
        }

        #datetime { 
            margin-top: 15px; 
            color: #7a869a; 
            font-size: 0.85rem; 
            font-weight: 400; /* Респектабельная плотность */
        }

        /* Сетка контента */
        .content-wrapper {
            width: 100%;
            max-width: 900px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: linear-gradient(145deg, #182029, #141a22);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.02);
            height: 120px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text-main);
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 10px 20px var(--shadow-dark), -5px -5px 15px var(--shadow-light);
        }

        .card span {
            font-size: 0.85rem; 
            font-weight: 700; /* Акцент на Bold, как у Кувена */
            letter-spacing: 3px; 
            text-transform: uppercase;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px; background: var(--accent-gold);
            opacity: 0.4; border-radius: 8px 8px 0 0;
        }

        /* Футер и Механика */
        footer {
            margin-top: 60px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .mechanics-wrapper {
            position: relative;
            width: 80px;
            height: 60px;
            margin-bottom: 10px;
        }

        .gear {
            position: absolute;
            fill: url(#goldGradientGear);
            filter: drop-shadow(0 2px 4px var(--shadow-dark));
        }

        .gear-main {
            width: 40px; height: 40px;
            left: 10px; top: 0;
            animation: spin-right 8s linear infinite;
        }

        .gear-second {
            width: 28px; height: 28px;
            right: 12px; bottom: 5px;
            animation: spin-left 6s linear infinite;
            opacity: 0.8;
        }

        .mechanics-wrapper::after {
            content: '';
            position: absolute;
            top: 15px; left: 15px;
            width: 10px; height: 10px;
            background: var(--gold-light);
            border-radius: 50%;
            filter: blur(8px);
            animation: core-pulse 2s ease-in-out infinite;
        }

        @keyframes spin-right { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-left { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes core-pulse { 
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(2.5); opacity: 0.6; }
        }

        .status-text {
            font-size: 0.75rem; 
            letter-spacing: 3px;
            text-transform: uppercase; 
            color: var(--accent-gold);
            font-weight: 700;
        }

        .info-block { font-size: 0.8rem; color: #7a869a; text-align: center; margin-top: 20px; }
        .info-block a { color: var(--accent-gold); text-decoration: none; font-weight: 700; }

        .dev-names {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--accent-gold) 45%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            filter: drop-shadow(0 2px 3px var(--shadow-dark));
            display: inline-block;
            transition: 0.3s;
        }

        .dev-credits:hover .dev-names {
            filter: drop-shadow(0 4px 6px var(--shadow-dark));
            transform: scale(1.05);
        }

        @media (min-width: 1100px) {
            .contact-info { position: absolute; bottom: 30px; left: 40px; text-align: left; margin: 0; }
            .dev-credits { position: absolute; bottom: 30px; right: 40px; text-align: right; margin: 0; }
        }
    </style>
</head>
<body>

    <svg style="width:0;height:0;position:absolute;">
        <defs>
            <linearGradient id="goldGradientGear" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:var(--gold-light);stop-opacity:1" />
                <stop offset="50%" style="stop-color:var(--accent-gold);stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--gold-dark);stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <header>
        <div class="brand-name">Trading Trust</div>
        <h1>Корпоративный ресурс</h1>
        <div id="datetime"></div>
    </header>

    <div class="content-wrapper">
        <nav class="grid-container">
            <a href="#" class="card"><span>Стратегия</span></a>
            <a href="#" class="card"><span>Аналитика</span></a>
            <a href="#" class="card"><span>Проекты</span></a>
            <a href="#" class="card"><span>Документы</span></a>
            <a href="#" class="card"><span>Капитал</span></a>
            <a href="#" class="card"><span>Связь</span></a>
        </nav>
    </div>

    <footer>
        <div class="mechanics-wrapper">
            <svg class="gear gear-main" viewBox="0 0 24 24">
                <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5m10-2.42V10.92l-2.42-.42c-.19-.76-.49-1.48-.88-2.12l1.42-1.99-1.84-1.84-1.99 1.42c-.64-.39-1.36-.69-2.12-.88L13.08 2h-2.16l-.42 2.42c-.76.19-1.48.49-2.12.88L6.39 3.88 4.55 5.72l1.42 1.99c-.39.64-.69 1.36-.88 2.12L2.67 10.92v2.16l2.42.42c.19.76.49 1.48.88 2.12l-1.42 1.99 1.84 1.84 1.99-1.42c.64.39 1.36.69 2.12.88l.42 2.42h2.16l.42-2.42c.76-.19 1.48-.49 2.12-.88l1.99 1.42 1.84-1.84-1.42-1.99c.39-.64.69-1.36.88-2.12l2.42-.42z"/>
            </svg>
            <svg class="gear gear-second" viewBox="0 0 24 24">
                <path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5m10-2.42V10.92l-2.42-.42c-.19-.76-.49-1.48-.88-2.12l1.42-1.99-1.84-1.84-1.99 1.42c-.64-.39-1.36-.69-2.12-.88L13.08 2h-2.16l-.42 2.42c-.76.19-1.48.49-2.12.88L6.39 3.88 4.55 5.72l1.42 1.99c-.39.64-.69 1.36-.88 2.12L2.67 10.92v2.16l2.42.42c.19.76.49 1.48.88 2.12l-1.42 1.99 1.84 1.84 1.99-1.42c.64.39 1.36.69 2.12.88l.42 2.42h2.16l.42-2.42c.76-.19 1.48-.49 2.12-.88l1.99 1.42 1.84-1.84-1.42-1.99c.39-.64.69-1.36.88-2.12l2.42-.42z"/>
            </svg>
        </div>
        <div class="status-text">система в процессе настройки</div>
    </footer>

    <aside class="info-block contact-info">
        Связь: <a href="mailto:tora@oqtora.ru">tora@oqtora.ru</a>
    </aside>

    <aside class="info-block dev-credits">
        Разработчики:<br>
        <span class="dev-names">WhiteWolf, Akio Mori, McMillan</span>
    </aside>

    <script>
        function update() {
            const n = new Date();
            const s = n.toLocaleString('ru-RU', {weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('datetime').innerText = s.charAt(0).toUpperCase() + s.slice(1);
        }
        setInterval(update, 1000); update();
    </script>
</body>
</html>
